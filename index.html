<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Case Opening</title>

<style>
  body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .case {
    width: 220px;
    height: 220px;
    border: 3px solid white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 20px;
    background: #1c1c1c;
  }

  button {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 16px;
  }

  .rarity-common { color: #bbb; }
  .rarity-rare { color: #4da3ff; }
  .rarity-epic { color: #b84dff; }
  .rarity-legendary { color: gold; }
</style>
</head>

<body>

<h1>Case Opening</h1>

<div class="case" id="caseBox">Tryck öppna</div>
<button onclick="openCase()">Öppna case</button>

<script>
const items = [
  { name: "Iron Sword", rarity: "common" },
  { name: "Wood Shield", rarity: "common" },
  { name: "Magic Ring", rarity: "rare" },
  { name: "Dragon Helm", rarity: "epic" },
  { name: "God Blade", rarity: "legendary" }
];

// Viktad RNG (så legendaries är ovanliga)
function getRandomItem() {
  const roll = Math.random() * 100;

  if (roll < 60) return items[0]; // common
  if (roll < 80) return items[2]; // rare
  if (roll < 95) return items[3]; // epic
  return items[4]; // legendary
}

function openCase() {
  const box = document.getElementById("caseBox");
  box.textContent = "Öppnar...";

  setTimeout(() => {
    const item = getRandomItem();
    box.textContent = item.name;
    box.className = "case rarity-" + item.rarity;
  }, 1000);
}
</script>

</body>
</html>
