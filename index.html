<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Case</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #e4bc5a;
  --red: #eb4b4b;
  --pink: #d32ce6;
  --purple: #8847ff;
  --blue: #4b69ff;
  --teal: #5e98d9;
  --gray: #b0c3d9;
  --bg: #0d0f14;
  --surface: #161a24;
  --surface2: #1c2130;
  --border: #252c3d;
}

html, body {
  height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: 'Barlow Condensed', sans-serif;
}

/* ── Landing ── */
#landing {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 1;
  transition: opacity 0.4s, pointer-events 0s 0.4s;
}
#landing.hidden { opacity: 0; pointer-events: none; }

#landing::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(228,188,90,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.big-btn {
  position: relative;
  width: 220px; height: 220px;
  border-radius: 50%;
  border: none; cursor: pointer;
  background: none; outline: none;
  -webkit-tap-highlight-color: transparent;
}
.big-btn::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 50%;
  background: conic-gradient(var(--gold), #c9a44e, var(--gold), #8a6b28, var(--gold));
  opacity: 0.7;
  animation: spin-ring 8s linear infinite;
}
.big-btn::after {
  content: '';
  position: absolute; inset: 2px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, #2a2310, #0d0f14);
  border: 1px solid rgba(228,188,90,0.15);
}
@keyframes spin-ring { to { transform: rotate(360deg); } }

.btn-inner {
  position: absolute; inset: 2px;
  border-radius: 50%; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; transition: transform 0.15s;
}
.big-btn:hover .btn-inner { transform: scale(1.04); }
.big-btn:active .btn-inner { transform: scale(0.96); }

.btn-icon { font-size: 52px; line-height: 1; filter: drop-shadow(0 0 12px rgba(228,188,90,0.5)); }
.btn-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold); opacity: 0.9;
}

.pulse-ring {
  position: absolute; inset: -30px;
  border-radius: 50%;
  border: 1px solid rgba(228,188,90,0.15);
  animation: pulse 3s ease-out infinite;
}
.pulse-ring:nth-child(2) { inset: -60px; animation-delay: 1s; }
.pulse-ring:nth-child(3) { inset: -90px; animation-delay: 2s; }
@keyframes pulse {
  0% { opacity: 0.6; transform: scale(0.95); }
  100% { opacity: 0; transform: scale(1.05); }
}

/* ── Overlay ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.96);
  z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
}
#overlay.show { opacity: 1; pointer-events: all; }

.close-btn {
  position: absolute; top: 24px; right: 28px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: #5a6478;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
  padding: 8px 16px; cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.close-btn:hover { color: #fff; border-color: #fff; }

/* ── Spinner ── */
.spinner-wrapper { width: min(860px, 92vw); position: relative; }

.spinner-track {
  overflow: hidden;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--surface);
  position: relative; height: 148px;
}
.spinner-track::before, .spinner-track::after {
  content: '';
  position: absolute; top: 0; bottom: 0;
  width: 140px; z-index: 10; pointer-events: none;
}
.spinner-track::before { left: 0; background: linear-gradient(to right, var(--surface), transparent); }
.spinner-track::after  { right: 0; background: linear-gradient(to left, var(--surface), transparent); }

.spinner-needle {
  position: absolute; top: 0; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 2px; background: var(--gold);
  z-index: 20; pointer-events: none;
}
.spinner-needle::before, .spinner-needle::after {
  content: ''; position: absolute; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
}
.spinner-needle::before { top: 0; border-top: 10px solid var(--gold); }
.spinner-needle::after  { bottom: 0; border-bottom: 10px solid var(--gold); }

.spinner-strip {
  display: flex; align-items: center;
  height: 100%; gap: 4px; padding: 0 4px;
  will-change: transform;
}

.item-card {
  flex-shrink: 0; width: 120px; height: 120px;
  border-radius: 6px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 10px 8px 8px;
  position: relative; overflow: hidden;
  border: 2px solid transparent;
  background: var(--surface2);
}
.item-card .item-icon {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -62%);
  font-size: 38px; opacity: 0.9;
}
.item-card .item-name {
  font-size: 10px; font-weight: 500; letter-spacing: 1px;
  text-align: center; text-transform: uppercase; color: #fff;
  line-height: 1.2; position: relative; z-index: 1;
}
.item-card .item-rarity {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 2px; font-weight: 600; position: relative; z-index: 1;
}
.item-card .shine {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
  pointer-events: none;
}

.r-consumer   { border-color: var(--gray);   } .r-consumer   .item-rarity { color: var(--gray);   }
.r-industrial { border-color: var(--teal);   } .r-industrial .item-rarity { color: var(--teal);   }
.r-milspec    { border-color: var(--blue);   } .r-milspec    .item-rarity { color: var(--blue);   }
.r-restricted { border-color: var(--purple); } .r-restricted .item-rarity { color: var(--purple); }
.r-classified { border-color: var(--pink);   } .r-classified .item-rarity { color: var(--pink);   }
.r-covert     { border-color: var(--red);    } .r-covert     .item-rarity { color: var(--red);    }
.r-gold       { border-color: var(--gold);   } .r-gold       .item-rarity { color: var(--gold);   }

/* ── Drop Chances Table ── */
.chances-table {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: min(860px, 92vw);
}

.chance-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 12px;
}

.chance-dot {
  width: 7px; height: 7px;
  border-radius: 2px; flex-shrink: 0;
}

.chance-name {
  font-size: 11px; letter-spacing: 1.5px;
  text-transform: uppercase; color: #6b7a94;
  font-weight: 500;
}

.chance-pct {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 1px;
  margin-left: 4px;
}

/* ── Inventory Panel ── */
#inv-panel {
  position: fixed; inset: 0; z-index: 40;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 48px 24px 40px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  overflow-y: auto;
}
#inv-panel.show { opacity: 1; pointer-events: all; }

.inv-header {
  display: flex; align-items: center;
  justify-content: space-between;
  width: min(800px, 100%);
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.inv-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px; font-weight: 700;
  letter-spacing: 5px; text-transform: uppercase; color: #fff;
}
.inv-count {
  font-size: 13px; letter-spacing: 2px;
  text-transform: uppercase; color: #4a5568; margin-top: 2px;
}

.btn-back {
  padding: 10px 22px;
  background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #4a5568;
  cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.btn-back:hover { color: #fff; border-color: #fff; }

/* ── Search Bar ── */
.inv-search-wrap {
  width: min(800px, 100%);
  margin-bottom: 20px;
  position: relative;
}

.inv-search {
  width: 100%;
  padding: 11px 16px 11px 40px;
  background: var(--surface2);
  border: 1px solid var(--border); border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; letter-spacing: 1.5px;
  text-transform: uppercase; color: #fff;
  outline: none;
  transition: border-color 0.2s;
}
.inv-search::placeholder { color: #3a4560; }
.inv-search:focus { border-color: rgba(228,188,90,0.4); }

.search-icon {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px; opacity: 0.35;
  pointer-events: none;
}

/* ── Rarity filter pills ── */
.rarity-filters {
  width: min(800px, 100%);
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 20px;
}

.filter-pill {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 1.5px;
  text-transform: uppercase; color: #4a5568;
  cursor: pointer; transition: all 0.2s;
}
.filter-pill:hover { color: #fff; border-color: #fff; }
.filter-pill.active {
  color: #0d0f14;
  border-color: transparent;
}

.inv-grid {
  display: flex; flex-wrap: wrap;
  gap: 10px;
  width: min(800px, 100%);
  justify-content: flex-start;
}

.inv-item {
  width: 110px; height: 110px;
  border-radius: 6px; background: var(--surface2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 8px 6px 8px;
  border: 1.5px solid;
  position: relative; overflow: hidden;
  cursor: default;
  transition: transform 0.15s;
}
.inv-item:hover { transform: scale(1.04); }

.inv-item .inv-emoji {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -65%); font-size: 34px;
}
.inv-item .inv-name {
  font-size: 9px; letter-spacing: 0.8px;
  text-transform: uppercase; text-align: center;
  font-weight: 500; color: #fff;
  line-height: 1.2; position: relative; z-index: 1;
}

.inv-no-results {
  color: #2a3040; font-size: 14px; letter-spacing: 3px;
  text-transform: uppercase; margin-top: 60px; width: 100%;
  text-align: center;
}

.inv-btn-landing {
  position: fixed; bottom: 32px; right: 32px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #4a5568;
  cursor: pointer; transition: color 0.2s, border-color 0.2s; z-index: 2;
}
.inv-btn-landing:hover { color: #fff; border-color: #fff; }
</style>
</head>
<body>

<!-- Landing -->
<div id="landing">
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <button class="big-btn" onclick="openOverlay()" aria-label="Open case">
    <div class="btn-inner">
      <div class="btn-icon">📦</div>
      <div class="btn-label">Open</div>
    </div>
  </button>
  <button class="inv-btn-landing" onclick="showInventory()">Inventory</button>
</div>

<!-- Inventory panel -->
<div id="inv-panel">
  <div class="inv-header">
    <div>
      <div class="inv-title">Inventory</div>
      <div class="inv-count" id="invCount">0 items</div>
    </div>
    <button class="btn-back" onclick="hideInventory()">← Back</button>
  </div>

  <!-- Search -->
  <div class="inv-search-wrap">
    <span class="search-icon">🔍</span>
    <input
      class="inv-search"
      id="invSearch"
      type="text"
      placeholder="Search items..."
      oninput="renderInventory()"
      autocomplete="off"
    />
  </div>

  <!-- Rarity filter pills -->
  <div class="rarity-filters" id="rarityFilters"></div>

  <div class="inv-grid" id="invGrid">
    <div class="inv-no-results" id="invEmpty">Nothing here yet</div>
  </div>
</div>

<!-- Spin overlay -->
<div id="overlay">
  <div class="spinner-wrapper">
    <div class="spinner-track" id="spinnerTrack">
      <div class="spinner-needle"></div>
      <div class="spinner-strip" id="strip"></div>
    </div>
  </div>

  <!-- Drop chances instead of rarity names -->
  <div class="chances-table" id="chancesTable"></div>
</div>

<script>
const ITEMS = [
  { name: 'Shadow Pistol',  rarity: 'consumer',      cls: 'r-consumer',   emoji: '🔫', prob: 0.40 },
  { name: 'Iron Dagger',    rarity: 'consumer',      cls: 'r-consumer',   emoji: '🗡️', prob: 0.40 },
  { name: 'Neon Buster',    rarity: 'industrial',    cls: 'r-industrial', emoji: '🔧', prob: 0.32 },
  { name: 'Cold Steel',     rarity: 'industrial',    cls: 'r-industrial', emoji: '⚙️', prob: 0.32 },
  { name: 'Arc Rifle',      rarity: 'mil-spec',      cls: 'r-milspec',    emoji: '🔩', prob: 0.18 },
  { name: 'Storm Blade',    rarity: 'mil-spec',      cls: 'r-milspec',    emoji: '⚡', prob: 0.18 },
  { name: 'Phantom Edge',   rarity: 'restricted',    cls: 'r-restricted', emoji: '🌀', prob: 0.08 },
  { name: 'Void Runner',    rarity: 'restricted',    cls: 'r-restricted', emoji: '💜', prob: 0.08 },
  { name: 'Dragon Tooth',   rarity: 'classified',    cls: 'r-classified', emoji: '🔮', prob: 0.032 },
  { name: 'Neon Serpent',   rarity: 'classified',    cls: 'r-classified', emoji: '🌸', prob: 0.032 },
  { name: 'Blood Contract', rarity: 'covert',        cls: 'r-covert',     emoji: '🔥', prob: 0.0064 },
  { name: 'Death Whisper',  rarity: 'covert',        cls: 'r-covert',     emoji: '💀', prob: 0.0064 },
  { name: '★ Golden Wrath', rarity: 'extraordinary', cls: 'r-gold',       emoji: '⭐', prob: 0.0026 },
];

const RARITY_COLOR = {
  consumer: 'var(--gray)', industrial: 'var(--teal)', 'mil-spec': 'var(--blue)',
  restricted: 'var(--purple)', classified: 'var(--pink)', covert: 'var(--red)',
  extraordinary: 'var(--gold)'
};

const RARITY_HEX = {
  consumer: '#b0c3d9', industrial: '#5e98d9', 'mil-spec': '#4b69ff',
  restricted: '#8847ff', classified: '#d32ce6', covert: '#eb4b4b',
  extraordinary: '#e4bc5a'
};

// Compute total probability weight
const TOTAL_PROB = ITEMS.reduce((s, i) => s + i.prob, 0);

// Build drop chances per rarity (sum probs per rarity / total * 100)
const RARITY_ORDER = ['consumer','industrial','mil-spec','restricted','classified','covert','extraordinary'];
const RARITY_LABEL = {
  consumer: 'Consumer', industrial: 'Industrial', 'mil-spec': 'Mil-Spec',
  restricted: 'Restricted', classified: 'Classified', covert: 'Covert',
  extraordinary: 'Extraordinary'
};

function getRarityChance(rarity) {
  const sum = ITEMS.filter(i => i.rarity === rarity).reduce((s, i) => s + i.prob, 0);
  return (sum / TOTAL_PROB * 100);
}

function formatChance(pct) {
  if (pct >= 1) return pct.toFixed(1) + '%';
  if (pct >= 0.1) return pct.toFixed(2) + '%';
  return pct.toFixed(3) + '%';
}

// Build chances table
function buildChancesTable() {
  const table = document.getElementById('chancesTable');
  table.innerHTML = '';
  RARITY_ORDER.forEach(rarity => {
    const pct = getRarityChance(rarity);
    const hex = RARITY_HEX[rarity];
    const row = document.createElement('div');
    row.className = 'chance-row';
    row.innerHTML = `
      <div class="chance-dot" style="background:${hex}"></div>
      <span class="chance-name">${RARITY_LABEL[rarity]}</span>
      <span class="chance-pct" style="color:${hex}">${formatChance(pct)}</span>
    `;
    table.appendChild(row);
  });
}

// Build rarity filter pills
function buildRarityFilters() {
  const container = document.getElementById('rarityFilters');
  container.innerHTML = '';

  // "All" pill
  const all = document.createElement('button');
  all.className = 'filter-pill active';
  all.dataset.rarity = 'all';
  all.style.backgroundColor = 'rgba(228,188,90,0.85)';
  all.textContent = 'All';
  all.onclick = () => setRarityFilter('all');
  container.appendChild(all);

  // One pill per rarity present in inventory
  const presentRarities = [...new Set(inventory.map(i => i.rarity))];
  RARITY_ORDER.filter(r => presentRarities.includes(r)).forEach(rarity => {
    const pill = document.createElement('button');
    pill.className = 'filter-pill';
    pill.dataset.rarity = rarity;
    pill.textContent = RARITY_LABEL[rarity];
    pill.onclick = () => setRarityFilter(rarity);
    container.appendChild(pill);
  });
}

let activeRarityFilter = 'all';

function setRarityFilter(rarity) {
  activeRarityFilter = rarity;
  document.querySelectorAll('.filter-pill').forEach(pill => {
    const isActive = pill.dataset.rarity === rarity;
    pill.classList.toggle('active', isActive);
    if (isActive) {
      const hex = rarity === 'all' ? 'rgba(228,188,90,0.85)' : RARITY_HEX[rarity] + 'cc';
      pill.style.backgroundColor = hex;
      pill.style.color = rarity === 'all' ? '#1a1200' : '#fff';
    } else {
      pill.style.backgroundColor = '';
      pill.style.color = '';
    }
  });
  renderInventory();
}

// Inventory
let inventory = [];
try { inventory = JSON.parse(localStorage.getItem('dropzone_inventory') || '[]'); } catch(e) {}

function saveInventory() {
  try { localStorage.setItem('dropzone_inventory', JSON.stringify(inventory)); } catch(e) {}
}

let spinning = false;
let animFrame = null;

function weightedRandom() {
  let r = Math.random() * TOTAL_PROB;
  for (const item of ITEMS) { r -= item.prob; if (r <= 0) return item; }
  return ITEMS[0];
}

function makeCard(item) {
  const d = document.createElement('div');
  d.className = `item-card ${item.cls}`;
  d.innerHTML = `<div class="shine"></div><div class="item-icon">${item.emoji}</div><div class="item-name">${item.name}</div><div class="item-rarity">${formatChance(getRarityChance(item.rarity))}</div>`;
  return d;
}

function buildStrip(winnerIndex) {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  strip.style.transform = 'translateX(0px)';
  const TOTAL = 80, WIN_POS = 66;
  for (let i = 0; i < TOTAL; i++) {
    strip.appendChild(makeCard(i === WIN_POS ? ITEMS[winnerIndex] : weightedRandom()));
  }
  return WIN_POS;
}

function triggerOpen() {
  if (spinning) return;
  spinning = true;

  const wonItem = weightedRandom();
  const winnerIndex = ITEMS.indexOf(wonItem);
  const winPos = buildStrip(winnerIndex);

  const strip = document.getElementById('strip');
  const CARD_W = 124;
  const trackW = document.getElementById('spinnerTrack').offsetWidth;
  const targetX = -(winPos * CARD_W - trackW / 2 + CARD_W / 2);

  const duration = 6200;
  const start = performance.now();
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const t = Math.min((now - start) / duration, 1);
    strip.style.transform = `translateX(${targetX * easeOut(t)}px)`;
    if (t < 1) {
      animFrame = requestAnimationFrame(animate);
    } else {
      spinning = false; animFrame = null;
      inventory.unshift({ ...wonItem, id: Date.now() });
      saveInventory();
      setTimeout(closeOverlay, 600);
    }
  }
  animFrame = requestAnimationFrame(animate);
}

function openOverlay() {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('overlay').classList.add('show');
  setTimeout(triggerOpen, 300);
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  setTimeout(() => document.getElementById('landing').classList.remove('hidden'), 10);
}

function showInventory() {
  activeRarityFilter = 'all';
  document.getElementById('invSearch').value = '';
  buildRarityFilters();
  renderInventory();
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('inv-panel').classList.add('show');
}

function hideInventory() {
  document.getElementById('inv-panel').classList.remove('show');
  setTimeout(() => document.getElementById('landing').classList.remove('hidden'), 10);
}

function renderInventory() {
  const query = document.getElementById('invSearch').value.trim().toLowerCase();
  const grid = document.getElementById('invGrid');
  const empty = document.getElementById('invEmpty');

  document.getElementById('invCount').textContent = `${inventory.length} item${inventory.length !== 1 ? 's' : ''}`;

  // Rebuild pills in case new rarities appeared
  buildRarityFilters();

  // Filter
  let filtered = inventory.filter(item => {
    const matchSearch = !query || item.name.toLowerCase().includes(query) || item.rarity.toLowerCase().includes(query);
    const matchRarity = activeRarityFilter === 'all' || item.rarity === activeRarityFilter;
    return matchSearch && matchRarity;
  });

  grid.querySelectorAll('.inv-item').forEach(el => el.remove());

  if (inventory.length === 0) {
    empty.textContent = 'Nothing here yet';
    empty.style.display = 'block';
    return;
  }

  if (filtered.length === 0) {
    empty.textContent = 'No items match your search';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  filtered.forEach(item => {
    const el = document.createElement('div');
    el.className = 'inv-item';
    el.style.borderColor = RARITY_HEX[item.rarity] || '#fff';
    el.innerHTML = `<div class="inv-emoji">${item.emoji}</div><div class="inv-name">${item.name}</div>`;
    grid.appendChild(el);
  });
}

// Init
buildChancesTable();
</script>
</body>
</html>
