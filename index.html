<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍋 Lemon Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #242424;
    --border: #2a2a2a;
    --lemon: #f5d000;
    --lemon-dim: #b89d00;
    --lemon-glow: rgba(245, 208, 0, 0.18);
    --lemon-glow-soft: rgba(245, 208, 0, 0.07);
    --acid: #c8ff00;
    --text: #e8e8e8;
    --text-dim: #666;
    --text-muted: #3a3a3a;
    --danger: #ff4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.6;
  }

  /* === LAYOUT === */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
    gap: 0;
  }

  /* === HEADER === */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--lemon);
    text-shadow: 0 0 30px var(--lemon-glow);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo span { font-size: 1.6rem; }

  .header-stats {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1px;
  }

  .stat-pill .label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .stat-pill .value {
    font-size: 0.95rem;
    color: var(--lemon);
    font-weight: 500;
  }

  /* === SIDEBAR LEFT (upgrades) === */
  .sidebar-left {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    background: var(--surface);
    max-height: calc(100vh - 65px);
    position: sticky;
    top: 65px;
  }

  .section-title {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* === CENTER === */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 28px;
    position: relative;
  }

  /* Lemon counter display */
  .lemon-count-display {
    text-align: center;
  }

  .lemon-count-display .big-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.5rem;
    color: var(--lemon);
    line-height: 1;
    text-shadow: 0 0 60px rgba(245,208,0,0.3);
    letter-spacing: 0.04em;
  }

  .lemon-count-display .sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Main clicker lemon */
  .clicker-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .glow-ring {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,208,0,0.1) 0%, transparent 70%);
    animation: pulse-ring 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.12); opacity: 1; }
  }

  .main-lemon {
    font-size: 7rem;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s ease, filter 0.08s ease;
    filter: drop-shadow(0 0 20px rgba(245,208,0,0.4));
    position: relative;
    z-index: 2;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .main-lemon:active {
    transform: scale(0.88) translateY(2px) !important;
    filter: drop-shadow(0 0 40px rgba(245,208,0,0.8));
    animation-play-state: paused;
  }

  .main-lemon:hover {
    filter: drop-shadow(0 0 30px rgba(245,208,0,0.6));
  }

  /* Click particles */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--lemon);
    text-shadow: 0 0 8px var(--lemon);
    font-family: 'DM Mono', monospace;
    z-index: 500;
    animation: fly-up 0.9s ease-out forwards;
  }

  @keyframes fly-up {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.6); }
  }

  /* Rate info */
  .rate-bar {
    display: flex;
    gap: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 24px;
  }

  .rate-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .rate-item .r-label {
    font-size: 0.58rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .rate-item .r-val {
    font-size: 0.88rem;
    color: var(--acid);
  }

  /* === GENERATORS (right sidebar) === */
  .sidebar-right {
    border-left: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    background: var(--surface);
    max-height: calc(100vh - 65px);
    position: sticky;
    top: 65px;
  }

  /* === UPGRADE CARDS === */
  .upgrade-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .upgrade-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--lemon-glow-soft), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .upgrade-card:hover::before { opacity: 1; }

  .upgrade-card:hover {
    border-color: var(--lemon-dim);
    transform: translateX(2px);
  }

  .upgrade-card.affordable {
    border-color: rgba(245,208,0,0.3);
  }

  .upgrade-card.affordable:hover {
    border-color: var(--lemon);
    box-shadow: 0 0 12px var(--lemon-glow);
  }

  .upgrade-card.maxed {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .upgrade-card.maxed:hover { transform: none; }

  .upgrade-icon { font-size: 1.5rem; flex-shrink: 0; }

  .upgrade-info { flex: 1; min-width: 0; }

  .upgrade-name {
    font-size: 0.78rem;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .upgrade-desc {
    font-size: 0.62rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .upgrade-cost {
    font-size: 0.75rem;
    color: var(--lemon);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .upgrade-cost.cant-afford { color: var(--text-dim); }

  /* === GENERATOR CARDS === */
  .gen-card {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .gen-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--lemon);
    width: var(--progress, 0%);
    transition: width 0.3s ease;
  }

  .gen-card:hover {
    border-color: var(--lemon-dim);
  }

  .gen-card.affordable {
    border-color: rgba(245,208,0,0.3);
  }

  .gen-card.affordable:hover {
    border-color: var(--lemon);
    box-shadow: 0 0 16px var(--lemon-glow);
  }

  .gen-emoji { font-size: 1.8rem; }

  .gen-info .gen-name {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
  }

  .gen-info .gen-rate {
    font-size: 0.62rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .gen-right { text-align: right; }

  .gen-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--lemon);
    line-height: 1;
  }

  .gen-cost {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .gen-cost.affordable-cost { color: var(--lemon-dim); }

  /* === MILESTONES / ACHIEVEMENTS === */
  .achievements-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 420px;
  }

  .achievement {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.65rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s ease;
  }

  .achievement.unlocked {
    border-color: var(--lemon-dim);
    color: var(--lemon);
    background: rgba(245,208,0,0.05);
  }

  /* === TOAST NOTIFICATIONS === */
  #toasts {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .toast {
    background: var(--surface3);
    border: 1px solid var(--lemon-dim);
    color: var(--lemon);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.78rem;
    animation: toast-in 0.3s ease, toast-out 0.3s ease 2.2s forwards;
    box-shadow: 0 0 20px var(--lemon-glow);
    white-space: nowrap;
  }

  @keyframes toast-in {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes toast-out {
    from { opacity: 1; }
    to   { opacity: 0; transform: translateY(-6px); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* === PRESTIGE === */
  .prestige-btn {
    background: transparent;
    border: 1px solid #333;
    color: var(--text-dim);
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  .prestige-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  .prestige-btn.ready {
    border-color: var(--danger);
    color: var(--danger);
    animation: danger-pulse 1.5s ease-in-out infinite;
  }

  @keyframes danger-pulse {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 16px rgba(255,68,68,0.3); }
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo"><span>🍋</span> LEMON EMPIRE</div>
    <div class="header-stats">
      <div class="stat-pill">
        <span class="label">Total Squeezed</span>
        <span class="value" id="total-lemons">0</span>
      </div>
      <div class="stat-pill">
        <span class="label">Per Second</span>
        <span class="value" id="header-lps">0/s</span>
      </div>
      <div class="stat-pill">
        <span class="label">Prestige</span>
        <span class="value" id="prestige-count">×1</span>
      </div>
    </div>
  </header>

  <!-- LEFT: UPGRADES -->
  <div class="sidebar-left">
    <div class="section-title">⚡ Upgrades</div>
    <div id="upgrades-list"></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="lemon-count-display">
      <div class="big-number" id="lemon-count">0</div>
      <div class="sub">🍋 Lemons in stock</div>
    </div>

    <div class="clicker-wrap">
      <div class="glow-ring"></div>
      <div class="main-lemon" id="main-lemon" title="Click to squeeze!">🍋</div>
    </div>

    <div class="rate-bar">
      <div class="rate-item">
        <span class="r-label">Per Click</span>
        <span class="r-val" id="per-click">1</span>
      </div>
      <div class="rate-item">
        <span class="r-label">Per Second</span>
        <span class="r-val" id="per-sec">0</span>
      </div>
      <div class="rate-item">
        <span class="r-label">Multiplier</span>
        <span class="r-val" id="multiplier">×1</span>
      </div>
    </div>

    <div class="achievements-strip" id="achievements"></div>

    <button class="prestige-btn" id="prestige-btn" onclick="prestige()">☢ Prestige Reset</button>
  </div>

  <!-- RIGHT: GENERATORS -->
  <div class="sidebar-right">
    <div class="section-title">🏭 Generators</div>
    <div id="generators-list"></div>
  </div>

</div>

<div id="toasts"></div>

<script>
// ============================================================
// GAME STATE
// ============================================================
let state = {
  lemons: 0,
  total: 0,
  clickPower: 1,
  multiplier: 1,
  prestige: 0,
  generators: {},
  upgrades: {}
};

// ============================================================
// DATA
// ============================================================
const GENERATORS = [
  { id: 'hand',      name: 'Hand Squeezer',    emoji: '✋', base: 15,   lps: 0.1,  desc: 'A tired hand doing its best.' },
  { id: 'juicer',    name: 'Juicer',            emoji: '🫙', base: 100,  lps: 0.5,  desc: 'Basic but reliable citrus press.' },
  { id: 'grove',     name: 'Lemon Grove',       emoji: '🌳', base: 500,  lps: 2,    desc: 'Your own slice of sunshine.' },
  { id: 'factory',   name: 'Lemon Factory',     emoji: '🏭', base: 2500, lps: 10,   desc: 'Industrial-grade sour power.' },
  { id: 'lab',       name: 'Citrus Lab',        emoji: '🔬', base: 10000,lps: 40,   desc: 'Science, but make it tart.' },
  { id: 'planet',    name: 'Lemon Planet',      emoji: '🪐', base: 50000,lps: 200,  desc: 'An entire world of lemons.' },
  { id: 'dimension', name: 'Citrus Dimension',  emoji: '🌀', base: 250000,lps:1000, desc: 'Beyond space. Beyond sour.' },
];

const UPGRADES = [
  { id: 'strong_hands',  name: 'Strong Hands',     emoji: '💪', cost: 50,     effect: () => { state.clickPower += 1; },    desc: '+1 per click',          maxBuy: 1 },
  { id: 'iron_grip',     name: 'Iron Grip',         emoji: '🦾', cost: 200,    effect: () => { state.clickPower += 5; },    desc: '+5 per click',          maxBuy: 1 },
  { id: 'double_squeeze',name: 'Double Squeeze',    emoji: '🍋', cost: 500,    effect: () => { state.multiplier *= 2; },    desc: '×2 all production',     maxBuy: 1 },
  { id: 'lemon_cult',    name: 'Lemon Cult',        emoji: '🙏', cost: 2000,   effect: () => { state.multiplier *= 2; },    desc: '×2 all production',     maxBuy: 1 },
  { id: 'zest_mode',     name: 'Zest Mode',         emoji: '⚡', cost: 5000,   effect: () => { state.clickPower += 20; },   desc: '+20 per click',         maxBuy: 1 },
  { id: 'golden_lemon',  name: 'Golden Lemon',      emoji: '✨', cost: 20000,  effect: () => { state.multiplier *= 3; },    desc: '×3 all production',     maxBuy: 1 },
  { id: 'sour_reactor',  name: 'Sour Reactor',      emoji: '☢️', cost: 100000, effect: () => { state.multiplier *= 5; },    desc: '×5 all production',     maxBuy: 1 },
  { id: 'mega_click',    name: 'Mega Click',        emoji: '👊', cost: 50000,  effect: () => { state.clickPower += 100; },  desc: '+100 per click',        maxBuy: 1 },
];

const ACHIEVEMENTS = [
  { id: 'first',    name: 'First Drop',      emoji: '🍋', condition: () => state.total >= 1 },
  { id: 'hundred',  name: 'Century',         emoji: '💯', condition: () => state.total >= 100 },
  { id: 'thousand', name: 'Kilo Lemon',      emoji: '🏆', condition: () => state.total >= 1000 },
  { id: 'million',  name: 'Millionaire',     emoji: '💰', condition: () => state.total >= 1e6 },
  { id: 'billion',  name: 'Lemon Tycoon',    emoji: '🌟', condition: () => state.total >= 1e9 },
  { id: 'prestige', name: 'Prestige Baron',  emoji: '☢', condition: () => state.prestige >= 1 },
  { id: 'maxgen',   name: 'Full Factory',    emoji: '🏭', condition: () => Object.values(state.generators).some(v => v >= 10) },
];

// ============================================================
// HELPERS
// ============================================================
function fmt(n) {
  if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

function genCount(id) { return state.generators[id] || 0; }

function genCost(gen) {
  return Math.floor(gen.base * Math.pow(1.15, genCount(gen.id)));
}

function totalLPS() {
  let lps = 0;
  for (const gen of GENERATORS) {
    lps += genCount(gen.id) * gen.lps;
  }
  return lps * state.multiplier;
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ============================================================
// RENDER
// ============================================================
function renderUpgrades() {
  const list = document.getElementById('upgrades-list');
  list.innerHTML = '';
  for (const up of UPGRADES) {
    const bought = state.upgrades[up.id];
    const affordable = state.lemons >= up.cost;
    const card = document.createElement('div');
    card.className = 'upgrade-card' + (bought ? ' maxed' : (affordable ? ' affordable' : ''));
    card.innerHTML = `
      <span class="upgrade-icon">${up.emoji}</span>
      <div class="upgrade-info">
        <div class="upgrade-name">${up.name}</div>
        <div class="upgrade-desc">${bought ? '✓ Purchased' : up.desc}</div>
      </div>
      <div class="upgrade-cost ${!affordable && !bought ? 'cant-afford' : ''}">
        ${bought ? '✓' : '🍋' + fmt(up.cost)}
      </div>
    `;
    if (!bought) card.onclick = () => buyUpgrade(up.id);
    list.appendChild(card);
  }
}

function renderGenerators() {
  const list = document.getElementById('generators-list');
  list.innerHTML = '';
  for (const gen of GENERATORS) {
    const cost = genCost(gen);
    const count = genCount(gen.id);
    const affordable = state.lemons >= cost;
    const card = document.createElement('div');
    card.className = 'gen-card' + (affordable ? ' affordable' : '');
    const progress = Math.min(100, (state.lemons / cost) * 100);
    card.style.setProperty('--progress', progress + '%');
    card.innerHTML = `
      <span class="gen-emoji">${gen.emoji}</span>
      <div class="gen-info">
        <div class="gen-name">${gen.name}</div>
        <div class="gen-rate">${gen.lps}/s each • ${gen.desc}</div>
      </div>
      <div class="gen-right">
        <div class="gen-count">${count}</div>
        <div class="gen-cost ${affordable ? 'affordable-cost' : ''}">🍋${fmt(cost)}</div>
      </div>
    `;
    card.onclick = () => buyGenerator(gen.id);
    list.appendChild(card);
  }
}

function renderAchievements() {
  const el = document.getElementById('achievements');
  el.innerHTML = '';
  for (const ach of ACHIEVEMENTS) {
    const unlocked = ach.condition();
    const div = document.createElement('div');
    div.className = 'achievement' + (unlocked ? ' unlocked' : '');
    div.innerHTML = `${ach.emoji} ${ach.name}`;
    el.appendChild(div);
  }
}

function updateStats() {
  const lps = totalLPS();
  document.getElementById('lemon-count').textContent = fmt(state.lemons);
  document.getElementById('total-lemons').textContent = fmt(state.total);
  document.getElementById('header-lps').textContent = fmt(lps) + '/s';
  document.getElementById('per-click').textContent = fmt(state.clickPower * state.multiplier);
  document.getElementById('per-sec').textContent = fmt(lps);
  document.getElementById('multiplier').textContent = '×' + state.multiplier.toFixed(1);
  document.getElementById('prestige-count').textContent = '×' + (state.prestige + 1);

  const prestigeBtn = document.getElementById('prestige-btn');
  if (state.total >= 1e6) {
    prestigeBtn.classList.add('ready');
    prestigeBtn.textContent = '☢ Prestige Reset (Ready!)';
  } else {
    prestigeBtn.classList.remove('ready');
    prestigeBtn.textContent = '☢ Prestige (Need 1M total)';
  }
}

// ============================================================
// ACTIONS
// ============================================================
function click(e) {
  const gain = Math.floor(state.clickPower * state.multiplier);
  state.lemons += gain;
  state.total += gain;

  // particle
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = '+' + fmt(gain) + ' 🍋';
  p.style.left = (e.clientX - 30) + 'px';
  p.style.top  = (e.clientY - 10) + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 900);

  checkAchievements();
}

function buyGenerator(id) {
  const gen = GENERATORS.find(g => g.id === id);
  const cost = genCost(gen);
  if (state.lemons < cost) return;
  state.lemons -= cost;
  state.generators[id] = genCount(id) + 1;
  if (genCount(id) === 1) toast(`🏭 Built your first ${gen.name}!`);
  render();
}

function buyUpgrade(id) {
  const up = UPGRADES.find(u => u.id === id);
  if (!up || state.upgrades[id] || state.lemons < up.cost) return;
  state.lemons -= up.cost;
  state.upgrades[id] = true;
  up.effect();
  toast(`⚡ Unlocked: ${up.name}`);
  render();
}

function prestige() {
  if (state.total < 1e6) { toast('🍋 Need 1,000,000 total lemons first!'); return; }
  if (!confirm('Prestige reset: lose everything but gain a permanent ×1.5 multiplier?')) return;
  state.prestige++;
  const bonus = Math.pow(1.5, state.prestige);
  state.lemons = 0;
  state.total = 0;
  state.clickPower = 1;
  state.multiplier = bonus;
  state.generators = {};
  state.upgrades = {};
  toast(`☢ Prestige ${state.prestige}! Multiplier: ×${bonus.toFixed(2)}`);
  render();
}

let achievementsUnlocked = new Set();
function checkAchievements() {
  for (const ach of ACHIEVEMENTS) {
    if (!achievementsUnlocked.has(ach.id) && ach.condition()) {
      achievementsUnlocked.add(ach.id);
      toast(`🏆 Achievement: ${ach.emoji} ${ach.name}`);
      renderAchievements();
    }
  }
}

function render() {
  renderUpgrades();
  renderGenerators();
  renderAchievements();
  updateStats();
}

// ============================================================
// GAME LOOP
// ============================================================
document.getElementById('main-lemon').addEventListener('click', click);

let lastTick = Date.now();
function gameLoop() {
  const now = Date.now();
  const dt = (now - lastTick) / 1000;
  lastTick = now;

  const lps = totalLPS();
  if (lps > 0) {
    const gain = lps * dt;
    state.lemons += gain;
    state.total += gain;
  }

  updateStats();
  // Re-render sides every 500ms to avoid thrashing
  requestAnimationFrame(gameLoop);
}

// Slow re-render for sidebars
setInterval(() => {
  renderUpgrades();
  renderGenerators();
  checkAchievements();
}, 500);

// ============================================================
// INIT
// ============================================================
render();
gameLoop();
</script>
</body>
</html>
